<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Potlift8 API Documentation</title>
  <meta name="description" content="Interactive API documentation for the Potlift8 Product Information Management API">
  <script type="module" src="https://unpkg.com/rapidoc/dist/rapidoc-min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <rapi-doc
    spec-url="/swagger/v1/swagger.yaml"
    render-style="view"
    theme="dark"
    bg-color="#1e1e1e"
    text-color="#f0f0f0"
    primary-color="#4CAF50"
    nav-bg-color="#2d2d2d"
    nav-text-color="#f0f0f0"
    nav-hover-bg-color="#3d3d3d"
    nav-hover-text-color="#ffffff"
    nav-accent-color="#4CAF50"

    show-header="true"
    header-color="#2d2d2d"

    allow-authentication="true"
    allow-server-selection="true"
    allow-api-list-style-selection="false"

    api-key-name="Authorization"
    api-key-location="header"
    api-key-value=""

    show-info="true"
    show-components="true"

    schema-style="table"
    schema-expand-level="2"
    schema-description-expanded="true"

    default-schema-tab="model"

    response-area-height="400px"

    allow-try="true"
    allow-spec-url-load="false"
    allow-spec-file-load="false"

    layout="row"
    sort-tags="false"
    sort-endpoints-by="path"

    font-size="default"
    use-path-in-nav-bar="false"

    persist-auth="true"

    match-paths=""
    regular-font="Segoe UI, Arial, sans-serif"
    mono-font="Monaco, Consolas, monospace"

    load-fonts="true"

    fill-request-fields-with-example="true"

    goto-path=""
  >
    <div slot="nav-logo" style="display: flex; align-items: center; padding: 16px; background-color: #1e1e1e;">
      <div style="margin-left: 0;">
        <div style="font-size: 24px; font-weight: bold; color: #4CAF50;">Potlift8</div>
        <div style="font-size: 12px; color: #999;">Product Information Management API</div>
      </div>
    </div>

    <div slot="footer" style="padding: 20px; text-align: center; background-color: #1e1e1e; border-top: 1px solid #333;">
      <p style="margin: 0; color: #999; font-size: 12px;">
        &copy; 2025 Potlift8 - Proprietary and Confidential
      </p>
      <p style="margin: 8px 0 0 0; color: #999; font-size: 12px;">
        For support: <a href="mailto:support@potlift.com" style="color: #4CAF50;">support@potlift.com</a>
      </p>
    </div>
  </rapi-doc>
</body>
</html>
