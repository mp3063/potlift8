# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Failed jobs persist in solid_queue_failed_executions forever by default,
  # keeping their full serialized arguments (which may be large). Expire old
  # failures after 30 days to bound storage growth.
  clear_old_failed_executions:
    command: "SolidQueue::FailedExecution.where('created_at < ?', 30.days.ago).find_each { |fe| fe.job&.destroy; fe.destroy }"
    schedule: every day at 3am
